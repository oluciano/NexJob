name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a feature request, search existing issues to avoid duplicates.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case. What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include API sketches if you have them.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you considered.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Core (IJob, IScheduler, models)
        - Storage provider (new or existing)
        - Dashboard
        - Configuration / appsettings
        - Observability / OpenTelemetry
        - Testing utilities
        - Documentation
        - Other
    validations:
      required: true
