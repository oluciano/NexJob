name: Bug report
description: Something is not working as expected
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: NexJob version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: input
    id: dotnet
    attributes:
      label: .NET version
      placeholder: "e.g. .NET 8.0.10"
    validations:
      required: true

  - type: input
    id: storage
    attributes:
      label: Storage provider
      placeholder: "e.g. NexJob.Postgres 0.2.0 / InMemory"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Code or steps to reproduce. The simpler, the faster we can fix it.
      render: csharp

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or exception
      render: text
