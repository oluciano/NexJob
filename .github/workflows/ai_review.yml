name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: AI PR Review
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_2 }}
          PR_AGENT.CONFIG: |
            config:
              model: "gemini/gemini-1.5-pro"
              fallback_models: ["gemini/gemini-1.5-pro"]
            github_action_config:
              auto_review: true
              handle_pr_actions: ["opened", "synchronize", "reopened", "ready_for_review"]
            pr_reviewer:
              inline_code_comments: true
              extra_instructions: "Focus on: invariant violations, StyleCop issues, missing XML docs, async violations."
