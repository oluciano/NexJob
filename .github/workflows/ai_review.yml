name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: AI PR Review
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_2 }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY_2 }}
          
          config.model: "gemini/gemini-1.5-pro"
          config.fallback_models: '["gemini/gemini-1.5-flash"]'

          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "false"
          github_action_config.handle_pr_actions: '["opened", "synchronize", "reopened", "ready_for_review"]'

          pr_reviewer.inline_code_comments: "true"
          pr_code_suggestions.num_code_suggestions: "4"

          pr_reviewer.extra_instructions: >
            You are reviewing NexJob, a .NET 8 background job processing library.
            Before reviewing, internalize these rules from CLAUDE.md and GEMINI.md:
            1. Storage is the single source of truth — no in-memory state overrides it.
            2. Dispatcher is stateless — all state transitions must be persisted.
            3. Deadline enforced before execution — expired jobs never execute.
            4. Dead-letter handlers must never crash the dispatcher — exceptions swallowed and logged only.
            Focus on: invariant violations, missing tests, StyleCop issues, missing XML docs, async violations.
            Do NOT comment on: formatting preferences, subjective style.

          config.ignore_paths: >
            ["**/bin/**", "**/obj/**", "**/nupkg/**",
             "ai-method/**", "prompts-archived/**",
             ".github/workflows/**",
             "**/*.md", "**/*.json", "**/*.yml"]
