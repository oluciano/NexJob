name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: AI PR Review
        uses: qodo-ai/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          
          config.model: "gemini/gemini-1.5-pro"
          config.fallback_models: '["gemini/gemini-1.5-flash"]'
          
          github_action_config.auto_review: "true"
          github_action_config.handle_pr_actions: '["opened", "synchronize", "reopened", "ready_for_review"]'
          
          pr_reviewer.inline_code_comments: "true"
          pr_reviewer.extra_instructions: >
            You are reviewing NexJob, a .NET 8 background job processing library.
            Focus on: invariant violations, StyleCop issues, missing XML docs, async violations.
