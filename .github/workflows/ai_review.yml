name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]

jobs:
  review:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: AI PR Review
        uses: Codium-ai/pr-agent@v0.22
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI.API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CONFIG.MODEL: "gemini-1.5-pro"
          PR_REVIEWER.EXTRA_INSTRUCTIONS: >
            You are reviewing NexJob, a .NET 8 background job processing library.
            Focus on: invariant violations, StyleCop issues, missing XML docs, async violations.
