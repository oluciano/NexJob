name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test tests/NexJob.Tests --no-build --configuration Release

  publish:
    name: Pack & Publish
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x
      - name: Restore & Build
        run: |
          dotnet restore
          dotnet build --no-restore --configuration Release
      - name: Pack
        run: |
          dotnet pack src/NexJob/NexJob.csproj --no-build --configuration Release --output ./nupkg
          dotnet pack src/NexJob.Postgres/NexJob.Postgres.csproj --no-build --configuration Release --output ./nupkg
          dotnet pack src/NexJob.MongoDB/NexJob.MongoDB.csproj --no-build --configuration Release --output ./nupkg
          dotnet pack src/NexJob.Dashboard/NexJob.Dashboard.csproj --no-build --configuration Release --output ./nupkg
      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./nupkg/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --prerelease=${{ contains(github.ref_name, '-') }}
