name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Extract version from Directory.Build.props
        id: version
        run: |
          VERSION=$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Check tag does not already exist
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping release."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag
        if: steps.tag_check.outputs.skip == 'false'
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create or update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.tag }} already exists — updating notes."
            gh release edit "${{ steps.version.outputs.tag }}" \
              --title "${{ steps.version.outputs.tag }}" \
              --generate-notes \
              --prerelease=${{ contains(steps.version.outputs.tag, '-') }}
          else
            gh release create "${{ steps.version.outputs.tag }}" \
              --title "${{ steps.version.outputs.tag }}" \
              --generate-notes \
              --prerelease=${{ contains(steps.version.outputs.tag, '-') }}
          fi
