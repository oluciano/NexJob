name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test Core
        run: |
          dotnet test tests/NexJob.Tests/NexJob.Tests.csproj \
            --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage/core/ \
            -- \
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Include="[NexJob]*"

      - name: Test Triggers
        run: |
          dotnet test tests/NexJob.Trigger.AwsSqs.Tests/NexJob.Trigger.AwsSqs.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage/awssqs/
          dotnet test tests/NexJob.Trigger.RabbitMQ.Tests/NexJob.Trigger.RabbitMQ.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage/rabbitmq/
          dotnet test tests/NexJob.Trigger.Kafka.Tests/NexJob.Trigger.Kafka.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage/kafka/
          dotnet test tests/NexJob.Trigger.GooglePubSub.Tests/NexJob.Trigger.GooglePubSub.Tests.csproj --no-build --configuration Release --collect:"XPlat Code Coverage" --results-directory ./coverage/pubsub/

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate Coverage Report
        run: |
          reportgenerator \
            -reports:"./coverage/**/coverage.cobertura.xml" \
            -targetdir:"./coverage-report" \
            -reporttypes:TextSummary \
            -title:NexJob-Coverage

      - name: Check Coverage Threshold
        run: |
          COVERAGE=$(grep "Line coverage" ./coverage-report/Summary.txt | awk '{print $3}' | sed 's/%//')
          echo "Current Line Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 80.0" | bc -l) )); then
            echo "Error: Line coverage ($COVERAGE%) is below 80%"
            exit 1
          fi

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-artifacts
          path: |
            **/TestResults/**/*.trx
            ./coverage-report/**

  integration-tests:
    name: Integration Tests - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: InMemory-EndToEnd
            filter: '(FullyQualifiedName~InMemoryStorageProviderTests)|(FullyQualifiedName~JobExecutionEndToEndTests)'
          - name: Redis
            filter: 'FullyQualifiedName~RedisStorageProviderTests'
          - name: Postgres
            filter: 'FullyQualifiedName~PostgresStorageProviderTests'
          - name: Mongo
            filter: 'FullyQualifiedName~MongoStorageProviderTests'
          - name: SqlServer
            filter: 'FullyQualifiedName~SqlServerStorageProviderTests'

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests
        run: |
          dotnet test tests/NexJob.IntegrationTests \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --filter "${{ matrix.filter }}" \
            --logger "trx;LogFileName=${{ matrix.name }}.trx" \
            --blame-hang \
            --blame-hang-timeout 5m

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-${{ matrix.name }}-artifacts
          path: |
            tests/NexJob.IntegrationTests/TestResults/**/*.trx
            tests/NexJob.IntegrationTests/TestResults/**/*

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity warn --no-restore

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerabilities
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "Vulnerable packages found!"
            cat vulnerable.txt
            exit 1
          fi
          echo "No vulnerable packages found"

      - name: Upload security scan output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-output
          path: vulnerable.txt
