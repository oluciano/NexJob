name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test tests/NexJob.Tests             --no-build             --configuration Release             --verbosity normal             --logger "trx;LogFileName=unit-tests.trx"             "/p:CollectCoverage=true"             "/p:CoverletOutputFormat=cobertura"             "/p:CoverletOutput=./coverage/"             "/p:Include=[NexJob]*"             "/p:Exclude=[NexJob.Tests]*%2c[*.Tests]*"             "/p:Threshold=80"             "/p:ThresholdType=line"             "/p:ThresholdStat=total"

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-artifacts
          path: |
            tests/NexJob.Tests/TestResults/**/*.trx
            tests/NexJob.Tests/coverage/**

  integration-tests:
    name: Integration Tests - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: InMemory-EndToEnd
            filter: '(FullyQualifiedName~InMemoryStorageProviderTests)|(FullyQualifiedName~JobExecutionEndToEndTests)'
          - name: Redis
            filter: 'FullyQualifiedName~RedisStorageProviderTests'
          - name: Postgres
            filter: 'FullyQualifiedName~PostgresStorageProviderTests'
          - name: Mongo
            filter: 'FullyQualifiedName~MongoStorageProviderTests'
          - name: SqlServer
            filter: 'FullyQualifiedName~SqlServerStorageProviderTests'

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run integration tests
        run: |
          dotnet test tests/NexJob.IntegrationTests             --no-build             --configuration Release             --verbosity normal             --filter "${{ matrix.filter }}"             --logger "trx;LogFileName=${{ matrix.name }}.trx"             --blame-hang             --blame-hang-timeout 5m

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-${{ matrix.name }}-artifacts
          path: |
            tests/NexJob.IntegrationTests/TestResults/**/*.trx
            tests/NexJob.IntegrationTests/TestResults/**/*

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity warn --no-restore

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerabilities
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "Vulnerable packages found!"
            cat vulnerable.txt
            exit 1
          fi
          echo "No vulnerable packages found"

      - name: Upload security scan output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-output
          path: vulnerable.txt
