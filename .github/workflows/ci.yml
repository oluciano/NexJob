name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: |
          dotnet test NexJob.sln \
            --no-build \
            --configuration Release \
            --filter "Category!=Integration&Category!=Reliability" \
            --logger "trx;LogFileName=unit-tests.trx" \
            "/p:CollectCoverage=true" \
            "/p:CoverletOutputFormat=cobertura" \
            "/p:Include=[NexJob*]*" \
            "/p:Exclude=[*Tests*]*%2c[*Sample*]*%2c[NexJob.Dashboard*]*" \
            "/p:Threshold=1" \
            "/p:ThresholdType=line"

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-artifacts
          path: |
            **/TestResults/**/*.trx
            **/coverage/**

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity warn --no-restore

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerabilities
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "Vulnerable packages found!"
            cat vulnerable.txt
            exit 1
          fi
          echo "No vulnerable packages found"

      - name: Upload security scan output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-output
          path: vulnerable.txt
