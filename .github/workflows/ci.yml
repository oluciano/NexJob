name: CI

on:
  pull_request:
    branches: [develop, main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test with coverage
        run: |
          # Rodar apenas projetos unitários puros
          dotnet test tests/NexJob.Tests/NexJob.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=core-tests.trx" "/p:CollectCoverage=true" "/p:CoverletOutputFormat=cobertura" "/p:CoverletOutput=./coverage/core/" "/p:Include=[NexJob]*" "/p:Threshold=80"
          dotnet test tests/NexJob.Trigger.AwsSqs.Tests/NexJob.Trigger.AwsSqs.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=awssqs-tests.trx" "/p:CollectCoverage=true" "/p:CoverletOutputFormat=cobertura" "/p:CoverletOutput=./coverage/awssqs/" "/p:Include=[NexJob.Trigger.AwsSqs]*" "/p:Threshold=80"
          dotnet test tests/NexJob.Trigger.RabbitMQ.Tests/NexJob.Trigger.RabbitMQ.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=rabbitmq-tests.trx" "/p:CollectCoverage=true" "/p:CoverletOutputFormat=cobertura" "/p:CoverletOutput=./coverage/rabbitmq/" "/p:Include=[NexJob.Trigger.RabbitMQ]*" "/p:Threshold=80"
          dotnet test tests/NexJob.Trigger.Kafka.Tests/NexJob.Trigger.Kafka.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=kafka-tests.trx" "/p:CollectCoverage=true" "/p:CoverletOutputFormat=cobertura" "/p:CoverletOutput=./coverage/kafka/" "/p:Include=[NexJob.Trigger.Kafka]*" "/p:Threshold=80"
          dotnet test tests/NexJob.Trigger.GooglePubSub.Tests/NexJob.Trigger.GooglePubSub.Tests.csproj --no-build --configuration Release --logger "trx;LogFileName=pubsub-tests.trx" "/p:CollectCoverage=true" "/p:CoverletOutputFormat=cobertura" "/p:CoverletOutput=./coverage/pubsub/" "/p:Include=[NexJob.Trigger.GooglePubSub]*" "/p:Threshold=80"

      - name: Upload unit test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-artifacts
          path: |
            **/TestResults/**/*.trx
            **/coverage/**

  format-check:
    name: Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity warn --no-restore

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerabilities
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "Vulnerable packages found!"
            cat vulnerable.txt
            exit 1
          fi
          echo "No vulnerable packages found"

      - name: Upload security scan output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-scan-output
          path: vulnerable.txt
