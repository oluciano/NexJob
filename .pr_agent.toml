[config]
model = "gemini/gemini-1.5-pro"
model_weak = "gemini/gemini-1.5-flash"
fallback_models = ["gemini/gemini-1.5-pro", "gemini/gemini-1.5-flash"]
use_repo_settings_file = true

[pr_reviewer]
require_focused_review = false
require_score_review = true
require_tests_review = true
require_security_review = true
require_estimate_effort_to_review = true
num_code_suggestions = 4
extra_instructions = """
You are reviewing NexJob, a .NET 8 background job processing library.
Rules: Storage is source of truth, dispatcher is stateless, deadline enforced before execution. 
Zero warnings in Release builds. StyleCop enforced.
"""

[pr_description]
enable_semantic_files_types = true
collapsible_file_list = "adaptive"

[pr_code_suggestions]
num_code_suggestions = 4
rank_suggestions = true

[github_action_config]
auto_review = true
auto_describe = false
auto_improve = false
